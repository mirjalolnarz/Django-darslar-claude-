<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Mening Blogim{% endblock %}</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
        nav a { margin-right: 16px; text-decoration: none; color: #333; }
        nav a:hover { color: #0077cc; }
    </style>
</head>
<body>
    <!-- templates/base.html -->
    <nav>
        <a href="/">🏠 Bosh sahifa</a>
        <a href="/haqida/">Haqimizda</a>

        {% if request.user.is_authenticated %}
            <span>👤 {{ request.user.username }}</span>
            <form method="post" action="/logout/" style="display:inline">
                {% csrf_token %}
                <button type="submit" style="background:none;border:none;cursor:pointer;color:#333">
                    Chiqish
                </button>
            </form>
        {% else %}
            <a href="/login/">Kirish</a>
            <a href="/register/">Ro'yxatdan o'tish</a>
        {% endif %}
    </nav>
    <hr>

    {% block content %}
    {% endblock %}

    <footer><p>© 2025 Mening Blogim</p></footer>
</body>
</html>
