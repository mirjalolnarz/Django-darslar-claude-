<!-- templates/posts/bosh.html -->
{% extends 'base.html' %}
{% block content %}
    <h1>Blog postlar</h1>
    {% for post in postlar %}
        <div>
            <h2><a href="/posts/{{ post.id }}/">{{ post.title }}</a></h2>
            <p>{{ post.content|truncatechars:100 }}</p>
            <small>{{ post.created_at|date:"d.m.Y" }}</small>
        </div>
    {% empty %}
        <p>Hozircha postlar yo'q.</p>
    {% endfor %}
{% endblock %}
