<!-- templates/posts/bosh.html -->
{% extends 'base.html' %}

{% block title %}{{ sarlavha }}{% endblock %}

{% block content %}
    <h1>{{ sarlavha }}</h1>
    <h2> So'nggi postlar</h2>
    <ul>
        {% for post in postlar %}
            <li>
                <a href="/posts/{{ post.id }}/">{{ post.title }}</a> - Muallif: {{ post.muallif }}
            </li>
        {% empty %}
            <li>Hozircha postlar mavjud emas.</li>
        {% endfor %}
    </ul>

{% endblock %}
