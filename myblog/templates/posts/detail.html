<!-- templates/posts/detail.html -->
{% extends 'base.html' %}
{% block content %}

<div class="post-card">
    <h1>{{ post.title }}</h1>
    <p class="post-meta">{{ post.created_at|date:"d.m.Y H:i" }}</p>

    {% if post.image %}
        <img src="{{ post.image.url }}"
             alt="{{ post.title }}"
             style="width:100%; border-radius:8px; margin:16px 0">
    {% endif %}

    <p>{{ post.content }}</p>

    {% if request.user.is_authenticated %}
        <a href="{% url 'post_update' post.pk %}" class="btn btn-primary">
            ✏ Tahrirlash
        </a>
        <a href="{% url 'post_delete' post.pk %}" class="btn btn-danger">
            🗑 O'chirish
        </a>
    {% endif %}
</div>

{% endblock %}
