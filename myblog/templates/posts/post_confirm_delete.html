<!-- templates/posts/post_confirm_delete.html -->
{% extends 'base.html' %}

{% block title %}Postni o'chirish{% endblock %}

{% block content %}
<h1>Postni o'chirishni tasdiqlang</h1>
<p>Haqiqatan ham <strong>"{{ post.title }}"</strong> ni o'chirmoqchimisiz?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" style="background:red; color:white; padding:8px 16px; border:none; border-radius:4px; cursor:pointer;">
        Ha, o'chirish
    </button>
    <a href="/posts/{{ post.id }}/">Bekor qilish</a>
</form>
{% endblock %}
